name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Remove large binary files
        run: |
          rm -f utils/bmc_qr.png
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push -f https://Musaasizi:$HF_TOKEN@huggingface.co/spaces/Cohenz-Pro-Hacker/Bot-3 main
        
